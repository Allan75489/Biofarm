<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Sistema de controle de estoque da BioSaúde">

    <title>BioSaúde - Estoque</title>

    <!-- FAVICON -->
    <link rel="icon" href="logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="Dashboard.css">
</head>

<body>

    <!-- CONTAINER GERAL -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>💊 BioSaúde</h2>
            <ul>
                <li><a href="Dashboard.html">Dashboard</a></li>
                <li><a href="Vendas.html">Vendas</a></li>
                <li><a href="Estoque.html" class="active">Estoque</a></li>
                <li><a href="Clientes.html">Clientes</a></li>
                <li><a href="Relatorios.html">Relatórios</a></li>
                <li><a href="Login.html">Sair</a></li>
            </ul>
        </aside>

        <!-- CONTEÚDO -->
        <main class="conteudo">

            <h1>Estoque BioSaúde</h1>

            <div class="filtro">
                
                <!-- ACESSIBILIDADE -->
                <label for="pesquisarProduto" style="display: none;">
                    Pesquisar produto
                </label>

                <input type="text" id="pesquisarProduto" placeholder="Pesquisar produto...">
                
                <button class="btn-add" id="adicionarProdutoBtn">
                    Adicionar Produto
                </button>
            </div>

            <table class="tabela-estoque">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Preço Unitário (R$)</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>

            <div class="pagination">
                <button id="prevPage">← Anterior</button>
                <span id="paginaAtual">1</span>
                <button id="nextPage">Próxima →</button>
            </div>

        </main>

    </div>
<script>
    document.addEventListener("DOMContentLoaded", () => {

    const itensPorPagina = 5;
    let paginaAtual = 1;

    const tabelaCorpo = document.getElementById("tabelaCorpo");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");
    const paginaSpan = document.getElementById("paginaAtual");
    const pesquisarInput = document.getElementById("pesquisarProduto");

    /* =========================
       DADOS INICIAIS (100 REMÉDIOS)
    ========================= */

    const nomes = [
        "Paracetamol", "Dipirona", "Amoxicilina",
        "Ibuprofeno", "Losartana",
        "Vitamina C", "Cetirizina", "Omeprazol"
    ];

    const dosagens = ["250mg", "500mg", "750mg", "1g"];

    const categorias = [
        "Analgésico", "Antibiótico", "Vitamina",
        "Antialérgico", "Digestivo"
    ];

    let produtos = [];

    for (let i = 0; i < 100; i++) {
        produtos.push({
            id: Date.now() + i,
            nome: `${nomes[i % nomes.length]} ${dosagens[i % dosagens.length]}`, // ✅ sem número
            quantidade: Math.floor(Math.random() * 50),
            preco: (Math.random() * 50 + 1).toFixed(2).replace(".", ","),
            categoria: categorias[i % categorias.length]
        });
    }

    /* =========================
       RENDER
    ========================= */

    function renderTabela() {

        tabelaCorpo.innerHTML = "";

        const termo = pesquisarInput.value.toLowerCase();

        const filtrados = produtos.filter(p =>
            p.nome.toLowerCase().includes(termo)
        );

        const totalPaginas = Math.ceil(filtrados.length / itensPorPagina);

        if (paginaAtual > totalPaginas) paginaAtual = totalPaginas || 1;

        const inicio = (paginaAtual - 1) * itensPorPagina;

        filtrados.slice(inicio, inicio + itensPorPagina)
            .forEach((prod, index) => {

                const numero = inicio + index + 1;

                const tr = document.createElement("tr");

                if (prod.quantidade < 5) {
                    tr.classList.add("low-stock");
                }

                tr.innerHTML = `
                    <td>${numero}. ${prod.nome}</td>
                    <td>${prod.quantidade}</td>
                    <td>R$ ${prod.preco}</td>
                    <td>${prod.categoria}</td>
                    <td>
                        <button class="btn-edit" data-id="${prod.id}">Editar</button>
                        <button class="btn-delete" data-id="${prod.id}">Remover</button>
                    </td>
                `;

                tabelaCorpo.appendChild(tr);
            });

        paginaSpan.textContent = `${paginaAtual} / ${totalPaginas || 1}`;
    }

    /* =========================
       EVENTOS
    ========================= */

    pesquisarInput.addEventListener("input", () => {
        paginaAtual = 1;
        renderTabela();
    });

    prevBtn.addEventListener("click", () => {
        if (paginaAtual > 1) {
            paginaAtual--;
            renderTabela();
        }
    });

    nextBtn.addEventListener("click", () => {

        const termo = pesquisarInput.value.toLowerCase();

        const totalPaginas = Math.ceil(
            produtos.filter(p => p.nome.toLowerCase().includes(termo)).length / itensPorPagina
        );

        if (paginaAtual < totalPaginas) {
            paginaAtual++;
            renderTabela();
        }
    });

    /* =========================
       ADICIONAR
    ========================= */

    document.getElementById("adicionarProdutoBtn")
        .addEventListener("click", () => {

            const nome = prompt("Nome do produto:");
            if (!nome) return;

            const quantidade = parseInt(prompt("Quantidade:")) || 0;
            const preco = prompt("Preço (R$):") || "0,00";
            const categoria = prompt("Categoria:") || "Geral";

            produtos.push({
                id: Date.now(),
                nome,
                quantidade,
                preco,
                categoria
            });

            renderTabela();
        });

    /* =========================
       EDITAR / REMOVER
    ========================= */

    tabelaCorpo.addEventListener("click", (e) => {

        const id = Number(e.target.dataset.id);
        const produto = produtos.find(p => p.id === id);

        if (!produto) return;

        if (e.target.classList.contains("btn-edit")) {

            const novaQtd = parseInt(prompt("Nova quantidade:", produto.quantidade));

            if (!isNaN(novaQtd)) {
                produto.quantidade = novaQtd;
                renderTabela();
            }
        }

        if (e.target.classList.contains("btn-delete")) {

            if (confirm(`Remover ${produto.nome}?`)) {
                produtos = produtos.filter(p => p.id !== id);
                renderTabela();
            }
        }
    });

    /* =========================
       INIT
    ========================= */

    renderTabela();
});
</script>
</body>

</html>
