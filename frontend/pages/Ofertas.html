<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas - BioSaúde</title>
    <link rel="stylesheet" href="../css/Ofertas.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="Home.html" class="back">⬅ Voltar</a>
        <h2>BioSaúde</h2>
        <input type="text" id="search" placeholder="Buscar ofertas...">
    </nav>

    <!-- Título -->
    <header class="header">
        <h1>🔥 Ofertas Especiais</h1>
        <p>Aproveite descontos imperdíveis</p>
    </header>

    <!-- Produtos -->
    <section class="products" id="productList">

        <div class="card">
            <span class="badge">-30%</span>
            <img src="../assets/Perfumaria/Perfume Floral feminino 01.jpeg" alt="Perfume Floral">
            <h3>Perfume Floral</h3>
            <p class="desc">Fragrância suave e duradoura</p>
            <p class="price">
                <span class="old">R$ 120,00</span>
                <span class="new">R$ 84,00</span>
            </p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <span class="badge">-20%</span>
            <img src="../icons/img/medicamentos/higiene/alcool-gel.png" alt="Alcool em Gel">
            <h3>Alcool em Gel</h3>
            <p class="desc">Higiene e desinfecção</p>
            <p class="price">
                <span class="old">R$ 7,00</span>
                <span class="new">R$ 5,60</span>
            </p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <span class="badge">-15%</span>
            <img src="../icons/img/medicamentos/analgesicos/dipirona.png" alt="Dipirona">
            <h3>dipirona</h3>
            <p class="desc">Alívio da dor e febre</p>
            <p class="price">
                <span class="old">R$ 6,00</span>
                <span class="new">R$ 5,10</span>
            </p>
            <button>Comprar</button>
        </div>

    </section>

    <script src="../js/Ofertas.js"></script>
</body>
</html>
