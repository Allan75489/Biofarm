<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfumaria - BioSaúde</title>
    <style>
        /* =========================
   RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* =========================
   BODY
========================= */
body {
    background: #0f172a;
    color: #e2e8f0;
}

/* =========================
   NAVBAR
========================= */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

.navbar h2 {
    color: #22c55e;
}

.btn-voltar {
    text-decoration: none;
    color: #e2e8f0;
    background: #1e293b;
    padding: 8px 15px;
    border-radius: 8px;
    transition: 0.3s;
}

.btn-voltar:hover {
    background: #22c55e;
    color: #020617;
}

/* =========================
   PERFUMARIA
========================= */
.perfumaria {
    padding: 40px;
}

.perfumaria h1 {
    margin-bottom: 20px;
}

/* =========================
   PRODUTOS
========================= */
.produtos {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

/* =========================
   CARD
========================= */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0;
}

.card p {
    font-size: 14px;
    color: #94a3b8;
}

/* =========================
   PREÇO
========================= */
.preco {
    display: block;
    margin: 10px 0;
    color: #22c55e;
    font-weight: bold;
}

/* =========================
   BOTÃO
========================= */
.card button {
    background: #22c55e;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #020617;
    font-weight: bold;
    transition: 0.3s;
}

.card button:hover {
    background: #16a34a;
}
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h2>BioSaúde</h2>

        <a href="../pages/home.html" class="btn-voltar">← Voltar</a>
    </nav>

    <!-- Conteúdo -->
    <section class="perfumaria">
        <h1>Perfumaria</h1>

        <div class="produtos">

            <!-- Card -->
            <div class="card">
                <img src="../assets/images/perfumaria/feminino/perfume-floral-01.jpg">
                <h3>Perfume Floral</h3>
                <p>Fragrância leve e suave</p>
                <span class="preco">R$ 89,90</span>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="../assets/images/perfumaria/masculino/perfume-madeira-01.jpg">
                <h3>Perfume Masculino</h3>
                <p>Aroma intenso e marcante</p>
                <span class="preco">R$ 129,90</span>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="../assets/images/perfumaria/body-splash/body-splash-01.jpg">
                <h3>Body Splash</h3>
                <p>Ideal para o dia a dia</p>
                <span class="preco">R$ 49,90</span>
                <button>Comprar</button>
            </div>

        </div>
    </section>

</body>
</html>
